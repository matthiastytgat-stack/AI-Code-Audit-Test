version: 2.1

jobs:
  aikido-scan:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - run:
          name: Install Aikido CI API Client
          command: npm install --global @aikidosec/ci-api-client
      - run:
          name: Run Aikido Scan (release)
          command: |
            npx --yes @aikidosec/ci-api-client scan-release "$AIKIDO_REPOSITORY_ID" "$CIRCLE_SHA1" \
              --apikey "$AIKIDO_CLIENT_API_KEY" \
              --fail-on-sast-scan \
              --fail-on-iac-scan \
              --fail-on-secrets-scan

workflows:
  aikido-security-scan:
    jobs:
      - aikido-scan:
          context: aikido  # holds AIKIDO_CLIENT_API_KEY as a CircleCI context/env var